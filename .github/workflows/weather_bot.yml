name: WPC Temperature Dashboard Bot

on:
  schedule:
    # Runs at 01:45 UTC and 13:45 UTC every day (gives NBM 15 mins of buffer time)
    - cron: '45 1,13 * * *'
  workflow_dispatch: # Adds a button so you can trigger it manually whenever you want!

permissions:
  contents: write # Allows the bot to push images back to your repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Geospatial & GRIB)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev proj-bin libproj-dev libgeos-dev

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Forecast Script
        run: python main.py

      - name: Commit and Push Generated Maps
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add output/*.png
          # If no changes were made, don't crash the action
          git commit -m "Automated update: NBM vs Superensemble Maps" || echo "No changes to commit"
          git push
